version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: formfordge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: formfordge-backend
    ports:
      - "5005:5005"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/formfordge
      - JWT_SECRET=supersecretjwtkey123
      - FRONTEND_URL=http://localhost:5173
      - PORT=5005
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: formfordge-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5005/api
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
